<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Локальный Трекер Тренировок</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
            --text-muted: #888888;
            --success-color: #393e46;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px; /* Отступ под таймер */
        }
        h2, h3 { margin: 10px 0; }
        select, button, input {
            background: #2d2d2d;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: var(--accent-color);
            cursor: pointer;
            font-weight: bold;
        }
        .workout-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .set-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 50px;
            gap: 5px;
            align-items: center;
            margin-bottom: 8px;
        }
        .set-row input { padding: 8px; text-align: center; }
        .set-header {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 50px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 5px;
        }
        .btn-check { background-color: #4ecca3; font-size: 14px; padding: 8px; }
        .btn-check.done { background-color: #393e46; opacity: 0.5; }
        
        /* Фиксированная панель таймера (для удобства на телефоне) */
        .timer-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #222831;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid var(--accent-color);
            z-index: 1000;
        }
        .timer-display { font-size: 20px; font-weight: bold; font-family: monospace; }
        .tempo-tag { background: #393e46; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="workout-section">
        <h2>🔥 Новая тренировка</h2>
        <label for="muscle-group">Целевая группа:</label>
        <select id="muscle-group" style="margin-top: 5px; margin-bottom: 15px;">
            <option value="Грудь">Грудь</option>
            <option value="Спина">Спина</option>
            <option value="Ноги">Ноги</option>
        </select>
        <div id="general-timer">Время сессии: 00:00</div>
    </div>

    <div class="workout-section">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>Основное упражнение</h3>
            <span class="tempo-tag">Темп: 3-0-1-0</span>
        </div>
        <hr style="border: 0.5px solid #333; margin-bottom: 15px;">

        <h4>🔄 Разминочные подходы (Отдых 90с)</h4>
        <div class="set-header"><span>Вес</span><span>Повт</span><span>-</span><span>-</span><span>Ок</span></div>
        <div class="set-row">
            <input type="number" placeholder="кг" id="w1-w">
            <input type="number" placeholder="раз" id="w1-r">
            <span style="text-align: center; color:var(--text-muted)">-</span>
            <span style="text-align: center; color:var(--text-muted)">-</span>
            <button class="btn-check" onclick="completeSet(this, 90)">✓</button>
        </div>
        <div class="set-row">
            <input type="number" placeholder="кг" id="w2-w">
            <input type="number" placeholder="раз" id="w2-r">
            <span style="text-align: center; color:var(--text-muted)">-</span>
            <span style="text-align: center; color:var(--text-muted)">-</span>
            <button class="btn-check" onclick="completeSet(this, 90)">✓</button>
        </div>

        <h4 style="color: #ffd369;">🔥 Рабочие подходы (Отдых 180с)</h4>
        <div class="set-header"><span>Вес</span><span>Повт</span><span>RPE</span><span>RIR</span><span>Ок</span></div>
        <div class="set-row">
            <input type="number" placeholder="кг" id="r1-w">
            <input type="number" placeholder="раз" id="r1-r">
            <input type="number" placeholder="1-10" id="r1-rpe" oninput="syncRpeRir(this, 'rir')">
            <input type="number" placeholder="0-5" id="r1-rir" oninput="syncRpeRir(this, 'rpe')">
            <button class="btn-check" onclick="completeSet(this, 180)">✓</button>
        </div>
        <div class="set-row">
            <input type="number" placeholder="кг" id="r2-w">
            <input type="number" placeholder="раз" id="r2-r">
            <input type="number" placeholder="1-10" id="r2-rpe" oninput="syncRpeRir(this, 'rir')">
            <input type="number" placeholder="0-5" id="r2-rir" oninput="syncRpeRir(this, 'rpe')">
            <button class="btn-check" onclick="completeSet(this, 180)">✓</button>
        </div>
        <div class="set-row">
            <input type="number" placeholder="кг" id="r3-w">
            <input type="number" placeholder="раз" id="r3-r">
            <input type="number" placeholder="1-10" id="r3-rpe" oninput="syncRpeRir(this, 'rir')">
            <input type="number" placeholder="0-5" id="r3-rir" oninput="syncRpeRir(this, 'rpe')">
            <button class="btn-check" onclick="completeSet(this, 180)">✓</button>
        </div>
    </div>

    <button onclick="saveWorkout()" style="background-color: #4ecca3; margin-top: 10px;">Завешить и сохранить тренировку</button>

    <div class="timer-panel">
        <div>⏱️ Отдых:</div>
        <div class="timer-display" id="rest-timer">00:00</div>
    </div>

    <script>
        // Общий таймер тренировки
        let startTime = Date.now();
        setInterval(() => {
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            let mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
            let secs = String(elapsed % 60).padStart(2, '0');
            document.getElementById('general-timer').innerText = `Время сессии: ${mins}:${secs}`;
        }, 1000);

        // Неубиваемый таймер отдыха (работает по временным меткам, а не просто интервалом)
        let restEndTime = null;
        let restInterval = null;

        function completeSet(btn, restDurationSeconds) {
            btn.classList.toggle('done');
            if (btn.classList.contains('done')) {
                btn.innerText = '⚙';
                startRestTimer(restDurationSeconds);
            } else {
                btn.innerText = '✓';
            }
        }

        function startRestTimer(seconds) {
            restEndTime = Date.now() + seconds * 1000;
            if (restInterval) clearInterval(restInterval);

            restInterval = setInterval(() => {
                let remaining = Math.ceil((restEndTime - Date.now()) / 1000);
                if (remaining <= 0) {
                    clearInterval(restInterval);
                    document.getElementById('rest-timer').innerText = "00:00";
                    document.getElementById('rest-timer').style.color = "#4ecca3";
                    // Вибрация телефона, если поддерживается браузером
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else {
                    let mins = String(Math.floor(remaining / 60)).padStart(2, '0');
                    let secs = String(remaining % 60).padStart(2, '0');
                    document.getElementById('rest-timer').innerText = `${mins}:${secs}`;
                    document.getElementById('rest-timer').style.color = "#ffd369";
                }
            }, 500);
        }

        // Автосвязывание RPE и RIR (RPE = 10 - RIR)
        function syncRpeRir(input, targetType) {
            let val = parseFloat(input.value);
            let row = input.parentElement;
            let rpeInput = row.querySelector('input[id$="-rpe"]');
            let rirInput = row.querySelector('input[id$="-rir"]');

            if (isNaN(val)) return;

            if (targetType === 'rir' && input === rpeInput) {
                rirInput.value = Math.max(0, 10 - val);
            } else if (targetType === 'rpe' && input === rirInput) {
                rpeInput.value = Math.max(0, 10 - val);
            }
        }

        // Локальное сохранение данных
        function saveWorkout() {
            const workoutData = {
                date: new Date().toISOString().split('T')[0],
                muscleGroup: document.getElementById('muscle-group').value,
                warmup: [
                    { w: document.getElementById('w1-w').value, r: document.getElementById('w1-r').value },
                    { w: document.getElementById('w2-w').value, r: document.getElementById('w2-r').value }
                ],
                working: [
                    { w: document.getElementById('r1-w').value, r: document.getElementById('r1-r').value, rpe: document.getElementById('r1-rpe').value, rir: document.getElementById('r1-rir').value, tempo: '3-0-1-0' },
                    { w: document.getElementById('r2-w').value, r: document.getElementById('r2-r').value, rpe: document.getElementById('r2-rpe').value, rir: document.getElementById('r2-rir').value, tempo: '3-0-1-0' },
                    { w: document.getElementById('r3-w').value, r: document.getElementById('r3-r').value, rpe: document.getElementById('r3-rpe').value, rir: document.getElementById('r3-rir').value, tempo: '3-0-1-0' }
                ]
            };

            // Достаем старый массив из LocalStorage или создаем новый
            let history = JSON.parse(localStorage.getItem('workout_history')) || [];
            history.push(workoutData);
            
            // Записываем обратно
            localStorage.setItem('workout_history', JSON.stringify(history));

            alert('Тонировка сохранена локально в браузере телефона!');
            console.log('Текущая история:', history);
        }
    </script>
</body>
</html>
